<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhiteBin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="atmosphere atmosphere--left" aria-hidden="true"></div>
  <div class="atmosphere atmosphere--right" aria-hidden="true"></div>

  <header class="nav-wrap">
    <nav class="nav">
      <a href="#" class="nav__logo" aria-label="WhiteBin home">
        <span class="nav__logo-icon"></span>
      </a>
      <div class="nav__links">
        <a href="#" class="nav__link">Reviews</a>
        <a href="#" class="nav__link">Pricing</a>
      </div>
      <a href="#" class="nav__cta">Message Us</a>
    </nav>
  </header>

  <main>
    <h1 class="hero">
      <span>Let us do the</span>
      <span>dirty cleaning for</span>
      <span>your trash bins.</span>
    </h1>

    <div class="bin-stage">
      <div class="bin-visual">
        <div class="bin-glow" aria-hidden="true"></div>
        <img src="trashbin.png" alt="" class="bin-image" width="520" height="620">
      </div>
    </div>

    <div class="footer-actions">
      <a href="#" class="message-now">Message Now</a>
      <p class="tagline">Best and fastest bin cleaners in the Woodlands Tx.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
